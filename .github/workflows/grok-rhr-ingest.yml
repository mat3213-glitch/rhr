name: grok-rhr-ingest

# Ingests Grok signals from signals/incoming/grok_*.json into RHR pipeline.
# Runs after grok-watchdog or manually.

on:
  schedule:
    - cron: "30 15 * * *"   # 15:30 UTC = 22:30 НСК (30 мин после watchdog)
  workflow_dispatch:
  push:
    paths:
      - "signals/incoming/grok_*.json"

permissions:
  contents: write
  issues: write

concurrency:
  group: db-write
  cancel-in-progress: true

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Init DB (if missing)
        run: python run.py init

      - name: Ingest Grok signals into pipeline
        run: python scripts/grok_ingest.py | python run.py ingest-stdin

      - name: Run pipeline (dedup → classify → score)
        run: python run.py pipeline

      - name: Commit DB snapshot
        run: |
          python -c "import sqlite3; sqlite3.connect('data/rhr.db').execute('PRAGMA wal_checkpoint(TRUNCATE)')"
          git config user.name "rhr-bot"
          git config user.email "actions@github.com"
          git add data/rhr.db || true
          if git diff --cached --quiet; then
            echo "no DB changes to commit"
          else
            git commit -m "data: grok rhr ingest $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin main
            git push
          fi
