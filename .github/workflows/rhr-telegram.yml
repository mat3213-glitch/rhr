name: rhr-telegram

# Full pipeline: scan Telegram → classify → score → create GitHub Issues.
# Runs twice daily. One workflow = one complete cycle.

on:
  schedule:
    - cron: "17 7 * * *"   # 07:17 UTC
    - cron: "43 19 * * *"  # 19:43 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

concurrency:
  group: rhr-telegram
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Init DB
        run: python run.py init

      - name: Scan Telegram channels
        run: python run.py scan telegram

      - name: Classify + Score
        run: python run.py pipeline

      - name: Create Issues for top candidates
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run.py track --top 10

      - name: Show status
        run: python run.py status
