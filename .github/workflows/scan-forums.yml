name: scan

# Fetches raw signals from enabled "clean" sources on a cron.
# Runs on the public-friendly sources (HN, RSS, public aggregators).
# Sensitive sources (Telegram, X via Grok, proxy-scraping) live in scan-deep.yml
# and require a self-hosted runner.
#
# Note on cron: GitHub Actions cron has ~5-15 min jitter and doesn't guarantee
# exact timing. We schedule conservatively; correctness does not depend on it.

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min
  workflow_dispatch:          # manual trigger from the Actions tab

permissions:
  contents: write             # to commit the DB back (repo-as-database)
  issues: write               # the classify job creates issues

concurrency:
  group: db-write
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Init DB (if missing)
        run: python run.py init

      - name: Restore last DB snapshot
        run: |
          # The DB lives in git (repo-as-database). It is checked out with the repo.
          # If you prefer artifacts instead, download the latest DB artifact here.
          if [ ! -f data/rhr.db ]; then python run.py init; fi

      - name: Scan all enabled clean sources
        run: python run.py scan

      - name: Commit DB snapshot
        run: |
          python -c "import sqlite3; sqlite3.connect('data/rhr.db').execute('PRAGMA wal_checkpoint(TRUNCATE)')"
          git config user.name "rhr-bot"
          git config user.email "actions@github.com"
          git add data/rhr.db || true
          if git diff --cached --quiet; then
            echo "no DB changes to commit"
          else
            git commit -m "data: scan snapshot $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin main
            git push
          fi
