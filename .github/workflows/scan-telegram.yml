name: scan-telegram

# Fetches signals from Telegram channels via t.me/s/ public preview.
# Runs on GitHub Actions (outside Russia) — t.me is accessible.
# Schedule: every 30 min, matching sources.yaml.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scan-telegram
  cancel-in-progress: false

jobs:
  scan-telegram:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Init DB (if missing)
        run: python run.py init

      - name: Scan Telegram channels
        run: python run.py scan telegram

      - name: Commit DB snapshot
        run: |
          git config user.name "rhr-bot"
          git config user.email "actions@github.com"
          git add data/rhr.db || true
          if git diff --cached --quiet; then
            echo "no DB changes to commit"
          else
            git commit -m "data: telegram scan $(date -u +%FT%TZ)"
            git push
          fi
